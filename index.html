<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Daily Feed</title>
  <meta name="description" content="A daily snapshot of the latest posts from an X account." />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>" />
</head>
<body>
  <header class="site-header">
    <h1 id="account">X Daily Feed</h1>
    <p class="updated" id="updated">Loading…</p>
  </header>

  <main id="timeline" class="timeline" aria-live="polite">
    <p class="status" id="status">Loading feed…</p>
  </main>

  <footer class="site-footer">
    <p>Updated once daily via GitHub Actions · static page, no tracking.</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
